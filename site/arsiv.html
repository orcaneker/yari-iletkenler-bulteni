<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arşiv — Yarı İletken Bülteni</title>
<link rel="alternate" type="application/rss+xml" href="feed.xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0C0F13;--panel:#13171D;--line:#272E38;--line-soft:#1E242C;
  --text:#E6E8EA;--muted:#8A939E;--dim:#5D6672;
  --copper:#C87A45;--copper-dim:#8A5530;--amber:#E8B33C;--amber-dim:#4A3A16;
  --sans:"Archivo",system-ui,sans-serif;--serif:"Source Serif 4",Georgia,serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--text);font-family:var(--serif);line-height:1.65;
  -webkit-font-smoothing:antialiased;
  background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),
    linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:56px 56px;background-position:-1px -1px;}
.wrap{max-width:1000px;margin:0 auto;padding:0 24px}
header{border-bottom:1px solid var(--line);background:rgba(12,15,19,.86);backdrop-filter:blur(8px)}
.mast{display:flex;align-items:baseline;gap:18px;padding:18px 0;flex-wrap:wrap}
.logo{font-family:var(--sans);font-weight:800;font-size:20px;letter-spacing:-.03em;text-transform:uppercase;display:flex;gap:10px;align-items:center;color:var(--text);text-decoration:none}
.nav{margin-left:auto;display:flex;gap:20px;font-family:var(--mono);font-size:12px;letter-spacing:.05em;text-transform:uppercase}
.nav a{color:var(--muted);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px}
.nav a:hover{color:var(--amber);border-color:var(--amber)}
h1{font-family:var(--sans);font-weight:800;font-size:clamp(28px,5vw,44px);letter-spacing:-.035em;margin:48px 0 8px}
.sub{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.05em;margin-bottom:36px}
.issue{display:grid;grid-template-columns:88px 1fr auto;gap:22px;align-items:start;
  padding:22px 0;border-top:1px solid var(--line);color:var(--text);text-decoration:none;transition:.15s}
.issue:hover{background:var(--panel)}
.issue:hover h2{color:var(--amber)}
.no{font-family:var(--sans);font-weight:800;font-size:30px;letter-spacing:-.04em;color:var(--copper);line-height:1}
.no small{display:block;font-family:var(--mono);font-size:10px;font-weight:400;color:var(--dim);letter-spacing:.06em;margin-top:5px}
.issue h2{font-family:var(--sans);font-weight:700;font-size:19px;line-height:1.28;letter-spacing:-.02em;transition:color .15s}
.issue .m{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:7px;letter-spacing:.03em}
.count{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;white-space:nowrap;padding-top:4px}
.count b{color:var(--amber);font-weight:500}
.empty{padding:70px 0;text-align:center;font-family:var(--mono);font-size:13px;color:var(--dim);border-top:1px solid var(--line)}
footer{border-top:1px solid var(--line);margin-top:50px;padding:30px 0 60px;font-family:var(--mono);font-size:11.5px;color:var(--dim)}
@media(max-width:640px){.issue{grid-template-columns:60px 1fr;gap:16px}.count{display:none}}
</style>
</head>
<body>
<header><div class="wrap mast">
  <a class="logo" href="index.html">
    <svg width="20" height="20" viewBox="0 0 22 22" aria-hidden="true">
      <rect x="4.5" y="4.5" width="13" height="13" fill="none" stroke="#C87A45" stroke-width="1.2"/>
      <rect x="8.5" y="8.5" width="5" height="5" fill="#E8B33C"/>
      <path d="M11 0v4.5M11 17.5V22M0 11h4.5M17.5 11H22" stroke="#8A5530" stroke-width="1"/>
    </svg>
    Yarı İletken Bülteni
  </a>
  <nav class="nav"><a href="index.html">Son sayı</a><a href="feed.xml">RSS</a></nav>
</div></header>

<main class="wrap">
  <h1>Arşiv</h1>
  <div class="sub" id="sub">Yayımlanmış tüm sayılar</div>
  <div id="list"></div>
</main>

<footer class="wrap">Her sayı kalıcı olarak saklanır — <code>data/arsiv/YYYY-Www.json</code></footer>

<script>
const AY=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
const t=s=>{const d=new Date(s);return `${d.getDate()} ${AY[d.getMonth()]}`;};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

fetch("data/index.json?v="+Date.now()).then(r=>r.json()).then(list=>{
  if(!list.length) throw 0;
  document.getElementById("sub").textContent = `${list.length} sayı yayımlandı`;
  document.getElementById("list").innerHTML = list.map(s=>`
    <a class="issue" href="index.html?sayi=${esc(s.hafta)}">
      <div class="no">${String(s.number).padStart(2,"0")}<small>${esc(s.hafta)}</small></div>
      <div>
        <h2>${esc(s.lead_title)}</h2>
        <div class="m">${t(s.coverage_start)} – ${t(s.coverage_end)} ${new Date(s.coverage_end).getFullYear()}
          · yayım ${t(s.publication_date)}</div>
      </div>
      <div class="count"><b>${s.story_count+1}</b> öne çıkan<br><b>${s.radar_count}</b> radar</div>
    </a>`).join("");
}).catch(()=>{
  document.getElementById("list").innerHTML='<div class="empty">Henüz arşivlenmiş sayı yok.</div>';
});
</script>
</body>
</html>
