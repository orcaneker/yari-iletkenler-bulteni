<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yarı İletken Bülteni</title>
<meta name="description" content="Haftalık yarı iletken sektörü, teknoloji ve sanayi politikası izleme bülteni.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   Fab temiz odaları SARI ışıkla aydınlatılır — fotorezist maviye
   duyarlı olduğu için. Bu palette bilinçli olarak MAVİ YOKTUR.
   Grafit gövde · bakır ara bağlantı · temiz oda kehribarı.
   ══════════════════════════════════════════════════════════ */
:root{
  --ink:#0C0F13; --panel:#13171D; --panel-2:#1A1F27;
  --line:#272E38; --line-soft:#1E242C;
  --text:#E6E8EA; --muted:#8A939E; --dim:#5D6672;
  --copper:#C87A45; --copper-dim:#8A5530;
  --amber:#E8B33C; --amber-dim:#4A3A16;
  --tr:#D4553C; --ok:#7FA05E;
  --sans:"Archivo",system-ui,sans-serif;
  --serif:"Source Serif 4",Georgia,serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --wrap:1280px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--ink); color:var(--text);
  font-family:var(--serif); font-size:16px; line-height:1.65;
  -webkit-font-smoothing:antialiased;
  background-image:
    linear-gradient(var(--line-soft) 1px,transparent 1px),
    linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:56px 56px; background-position:-1px -1px;
}
body::before{
  content:""; position:fixed; inset:0 0 auto 0; height:460px; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse 80% 100% at 50% 0%,rgba(232,179,60,.08),transparent 70%);
}
.wrap{max-width:var(--wrap);margin:0 auto;padding:0 24px;position:relative;z-index:1}

/* ── MASTHEAD ── */
header{border-bottom:1px solid var(--line);background:rgba(12,15,19,.88);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
.mast{display:flex;align-items:baseline;gap:20px;padding:18px 0;flex-wrap:wrap}
.logo{font-family:var(--sans);font-weight:800;font-size:21px;letter-spacing:-.03em;text-transform:uppercase;display:flex;align-items:center;gap:10px;color:var(--text);text-decoration:none}
.issue{font-family:var(--mono);font-size:11px;color:var(--amber);border:1px solid var(--amber-dim);padding:3px 8px;letter-spacing:.06em}
.coverage{font-family:var(--mono);font-size:12px;color:var(--muted)}
.nav{margin-left:auto;display:flex;gap:20px;font-family:var(--mono);font-size:12px;letter-spacing:.05em;text-transform:uppercase}
.nav a{color:var(--muted);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px}
.nav a:hover{color:var(--amber);border-color:var(--amber)}

/* ── HERO MEDYA ───────────────────────────────────────────
   Görsel:  assets/img/hero.jpg
   Video :  assets/video/hero.webm  (varsa görselin yerini alır)
   Hiçbiri yoksa alan tamamen gizli kalır, düzen bozulmaz.   */
.hero{position:relative;height:300px;overflow:hidden;border-bottom:1px solid var(--line);display:none}
.hero.on{display:block}
.hero img,.hero video{width:100%;height:100%;object-fit:cover;opacity:.42;filter:grayscale(.25) contrast(1.08)}
.hero::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(12,15,19,.35),var(--ink) 92%)}
@media(prefers-reduced-motion:reduce){.hero video{display:none}}

/* ── 60 SANİYEDE ── */
.brief-sec{padding:38px 0;border-bottom:1px solid var(--line);max-width:920px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
.brief-sec ol{list-style:none;counter-reset:b}
.brief-sec li{counter-increment:b;display:flex;gap:14px;padding:11px 0;border-bottom:1px dotted var(--line-soft);font-size:16px}
.brief-sec li:last-child{border:0}
.brief-sec li::before{content:counter(b,decimal-leading-zero);font-family:var(--mono);font-size:11px;color:var(--copper);padding-top:5px;flex:none}
.blink{cursor:pointer;border-bottom:1px solid var(--copper-dim);transition:.15s}
.blink:hover{color:var(--amber);border-color:var(--amber)}

.audio-bar{margin-top:24px;display:none;align-items:center;gap:14px;padding:14px 16px;
  background:var(--panel);border:1px solid var(--line);border-left:2px solid var(--amber);max-width:540px}
.audio-bar.on{display:flex}
.play{flex:none;width:34px;height:34px;border:1px solid var(--copper-dim);background:var(--panel-2);
  color:var(--amber);cursor:pointer;display:grid;place-items:center;font-size:12px}
.play:hover{border-color:var(--amber);background:var(--amber-dim)}
.audio-meta{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.audio-meta b{display:block;color:var(--text);font-weight:500;margin-bottom:3px}
.audio-bar audio{flex:1;height:34px;min-width:0}

/* ── MANŞET ── */
.lead{padding:44px 0;border-bottom:1px solid var(--line);cursor:pointer;display:grid;
  grid-template-columns:1.15fr .85fr;gap:40px;align-items:center}
.lead.noimg{grid-template-columns:1fr}
.lead:hover h1{color:var(--amber)}
.lead h1{font-family:var(--sans);font-weight:800;font-size:clamp(28px,3.6vw,44px);line-height:1.09;letter-spacing:-.035em;margin:14px 0 18px;transition:color .18s}
.lead p{font-size:18px;line-height:1.6;color:#C9CDD2}
.lead-img{aspect-ratio:16/10;overflow:hidden;border:1px solid var(--line);background:var(--panel)}
.lead-img img{width:100%;height:100%;object-fit:cover;display:block}
.tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);border-left:2px solid var(--amber);padding-left:8px}

/* ── ÖNE ÇIKANLAR — 3 SÜTUN, boş hücre YOK ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line)}
.card{background:none;border:0;border-bottom:1px solid var(--line);border-right:1px solid var(--line);
  padding:0 22px 24px;cursor:pointer;text-align:left;font:inherit;color:inherit;transition:background .18s;
  display:flex;flex-direction:column}
.card:nth-child(3n+1){padding-left:0}
.card:nth-child(3n){border-right:0;padding-right:0}
.card:hover{background:var(--panel)}
.card:hover h2{color:var(--amber)}
.card:hover .card-img img{transform:scale(1.04)}
.card-img{aspect-ratio:16/9;overflow:hidden;background:var(--panel-2);border:1px solid var(--line);margin:22px 0 16px}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.card.noimg{padding-top:24px}
.meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:11px}
.cat{color:var(--copper)}
.cat[data-c="turkiye"]{color:var(--tr)}
.mat{border:1px solid var(--line);padding:1px 6px;color:var(--muted)}
.card h2{font-family:var(--sans);font-weight:700;font-size:18.5px;line-height:1.26;letter-spacing:-.02em;margin-bottom:10px;transition:color .18s}
.card p{font-size:14.5px;color:var(--muted);line-height:1.6;flex:1}
.src{margin-top:15px;font-family:var(--mono);font-size:10.5px;color:var(--dim);display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.t1{color:var(--ok)}

/* ── RADAR ── */
.radar{padding:44px 0}
.rgrid{columns:2;column-gap:44px}
.cluster{break-inside:avoid;margin-bottom:26px}
.cluster h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--copper);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.cluster h3::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.cluster a{display:flex;gap:12px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--line-soft);color:var(--text);text-decoration:none;font-size:14.5px;line-height:1.5}
.cluster a:hover{color:var(--amber)}
.cluster a time{font-family:var(--mono);font-size:10.5px;color:var(--dim);flex:none;width:44px}
.cluster a em{font-family:var(--mono);font-size:10.5px;color:var(--dim);font-style:normal;margin-left:auto;flex:none;padding-left:10px}

/* ── DETAY PANELİ ── */
.sheet{position:fixed;inset:0;z-index:100;display:none}
.sheet.on{display:block}
.veil{position:absolute;inset:0;background:rgba(6,8,10,.82);backdrop-filter:blur(3px)}
.doc{position:absolute;top:0;right:0;bottom:0;width:min(700px,100%);background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:30px 34px 60px;animation:slide .22s ease-out}
@keyframes slide{from{transform:translateX(24px);opacity:0}}
.close{position:sticky;top:0;float:right;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);width:30px;height:30px;cursor:pointer;font-family:var(--mono)}
.close:hover{color:var(--amber);border-color:var(--amber)}
.doc-img{margin:16px 0 4px;border:1px solid var(--line);aspect-ratio:16/9;overflow:hidden;clear:both}
.doc-img img{width:100%;height:100%;object-fit:cover;display:block}
.doc h2{font-family:var(--sans);font-weight:800;font-size:26px;line-height:1.16;letter-spacing:-.025em;margin:16px 0;clear:both}
.doc .body p{margin-bottom:15px;font-size:16.5px;line-height:1.72;color:#CFD3D8}
.facts{display:flex;flex-wrap:wrap;gap:6px;margin:20px 0}
.fact{font-family:var(--mono);font-size:10.5px;padding:3px 8px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted)}
.fact b{color:var(--text);font-weight:500}
.why{display:none;margin:22px 0;padding:16px 18px;background:var(--amber-dim);border-left:2px solid var(--amber)}
.why.on{display:block}
.why span{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);display:block;margin-bottom:6px}
.sources{margin-top:26px;padding-top:18px;border-top:1px solid var(--line)}
.sources h4{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.sources a{display:block;padding:7px 0;color:var(--text);text-decoration:none;font-family:var(--mono);font-size:12.5px;border-bottom:1px solid var(--line-soft)}
.sources a:hover{color:var(--amber)}
.sources a .p{color:var(--ok);font-size:10px}

footer{border-top:1px solid var(--line);padding:32px 0 60px;margin-top:16px;font-family:var(--mono);font-size:11.5px;color:var(--dim);line-height:1.9}
footer a{color:var(--muted)}
.empty{padding:60px 0;text-align:center;font-family:var(--mono);font-size:13px;color:var(--dim)}
.hidden{display:none!important}

@media(max-width:1080px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .card:nth-child(3n){border-right:1px solid var(--line);padding-right:22px}
  .card:nth-child(3n+1){padding-left:22px}
  .card:nth-child(2n+1){padding-left:0}
  .card:nth-child(2n){border-right:0;padding-right:0}
}
@media(max-width:760px){
  .lead{grid-template-columns:1fr;gap:22px}
  .grid{grid-template-columns:1fr}
  .card,.card:nth-child(n){padding:0 0 24px;border-right:0}
  .rgrid{columns:1}
  .doc{width:100%;padding:24px 20px 50px}
  .nav{width:100%;margin-left:0;padding-top:6px}
  .hero{height:180px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="wrap mast">
    <a class="logo" href="index.html">
      <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
        <rect x="4.5" y="4.5" width="13" height="13" fill="none" stroke="#C87A45" stroke-width="1.2"/>
        <rect x="8.5" y="8.5" width="5" height="5" fill="#E8B33C"/>
        <path d="M11 0v4.5M11 17.5V22M0 11h4.5M17.5 11H22M4.5 7H1M4.5 15H1M17.5 7H21M17.5 15H21M7 4.5V1M15 4.5V1M7 17.5V21M15 17.5V21" stroke="#8A5530" stroke-width="1"/>
      </svg>
      Yarı İletken Bülteni
    </a>
    <span class="issue" id="issueNo">SAYI —</span>
    <span class="coverage" id="coverage">—</span>
    <nav class="nav"><a href="arsiv.html">Arşiv</a></nav>
  </div>
</header>

<!-- HERO — assets/img/hero.jpg veya assets/video/hero.webm koyunca otomatik açılır -->
<div class="hero" id="hero"></div>

<main class="wrap">

  <section class="brief-sec">
    <div class="eyebrow">Bu hafta 60 saniyede</div>
    <ol id="brief"></ol>
    <div class="audio-bar" id="audioBar">
      <button class="play" id="playBtn" aria-label="Sesli özeti dinle">&#9654;</button>
      <span class="audio-meta"><b>Sesli özet</b><span id="audioDur"></span></span>
      <audio preload="none" controls id="audioEl"></audio>
    </div>
  </section>

  <article class="lead hidden" id="lead"></article>
  <section class="grid" id="grid"></section>

  <section class="radar">
    <div class="eyebrow">Radar</div>
    <div class="rgrid" id="radar"></div>
  </section>

</main>

<footer class="wrap">
  Her pazartesi otomatik üretilir. <span class="t1">&#9679;</span> Birincil kaynak: resmî kurum ve
  şirket duyuruları. Taslak sürüm — resmî Bakanlık görüşü değildir.
  <a href="arsiv.html">Arşiv</a>
</footer>

<div class="sheet" id="sheet">
  <div class="veil" data-close></div>
  <div class="doc" id="doc" role="dialog" aria-modal="true"></div>
</div>

<script>
const CAT = {
  politika:"Politika & Jeopolitik", yatirim:"Yatırım & Üretim",
  ekipman:"Ekipman & Malzeme", teknoloji:"Süreç Teknolojisi",
  paketleme:"İleri Paketleme & Test", bellek:"Bellek & Depolama",
  "ai-cip":"AI Çipleri & Veri Merkezi", tasarim:"Tasarım, EDA & IP",
  guc:"Güç & Bileşik Yarı İletkenler", uygulama:"Otomotiv, Savunma & Endüstri",
  turkiye:"Türkiye", rapor:"Rapor & Piyasa Verisi"
};
const MAT = {
  research:"araştırma", pilot:"pilot", qualification:"nitelendirme",
  announced:"duyuruldu", funded:"finanse edildi", construction:"inşaat",
  equipment_install:"ekipman kurulumu", mass_production:"seri üretim",
  delayed:"ertelendi", cancelled:"iptal"
};
const AY = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
const tarih = s => { if(!s) return "—"; const d=new Date(s); return d.getDate()+" "+AY[d.getMonth()]; };
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const host = u => { try{ return new URL(u).hostname.replace(/^www\./,""); }catch(e){ return ""; } };
const img = s => (s && s.image && s.image.url) ? s.image.url : null;

let DATA=null, TUM=[];

// ?sayi=2026-W29 → arşiv sayısı; yoksa son sayı
const sayi = new URLSearchParams(location.search).get("sayi");
const kaynak = sayi ? "data/arsiv/"+sayi+".json" : "data/latest.json";

fetch(kaynak + "?v=" + Date.now())
  .then(function(r){ if(!r.ok) throw 0; return r.json(); })
  .then(function(d){ DATA=d; ciz(); })
  .catch(function(){ document.getElementById("grid").innerHTML =
    '<div class="empty">Bülten yüklenemedi.</div>'; });

function heroMedya(){
  const h = document.getElementById("hero");
  const v = document.createElement("video");
  v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
  v.oncanplay = function(){ h.appendChild(v); h.classList.add("on"); };
  v.onerror = function(){
    const i = new Image();
    i.onload = function(){ h.appendChild(i); h.classList.add("on"); };
    i.onerror = function(){};      // hiçbir medya yoksa alan gizli kalır
    i.src = "assets/img/hero.jpg"; i.alt = "";
  };
  v.src = "assets/video/hero.webm";
}

function ciz(){
  const i = DATA.issue;
  document.getElementById("issueNo").textContent = "SAYI " + String(i.number).padStart(2,"0");
  document.getElementById("coverage").textContent =
    tarih(i.coverage_start) + " – " + tarih(i.coverage_end) + " " +
    new Date(i.coverage_end).getFullYear();

  TUM = [DATA.lead].concat(DATA.stories||[]).filter(Boolean);
  heroMedya();

  document.getElementById("brief").innerHTML = (DATA.brief||[]).map(function(b){
    const t = typeof b === "string" ? b : (b.text||"");
    const sl = (typeof b === "object" && b.slug) ? b.slug : null;
    return sl ? '<li><span class="blink" data-slug="'+esc(sl)+'">'+esc(t)+'</span></li>'
              : '<li><span>'+esc(t)+'</span></li>';
  }).join("");
  document.querySelectorAll(".blink").forEach(function(x){ x.onclick=function(){ ac(x.dataset.slug); }; });

  if(i.audio && i.audio.url){
    const a = document.getElementById("audioEl");
    a.src = i.audio.url;
    const sn = i.audio.duration_sec;
    document.getElementById("audioDur").textContent =
      sn ? Math.floor(sn/60)+":"+String(sn%60).padStart(2,"0") : "";
    document.getElementById("audioBar").classList.add("on");
    const btn = document.getElementById("playBtn");
    btn.onclick = function(){ a.paused ? a.play() : a.pause(); };
    a.onplay = function(){ btn.innerHTML="&#10074;&#10074;"; };
    a.onpause = a.onended = function(){ btn.innerHTML="&#9654;"; };
  }

  // Manşet
  const L = DATA.lead, el = document.getElementById("lead");
  if(L){
    const gi = img(L);
    el.classList.remove("hidden");
    el.classList.toggle("noimg", !gi);
    el.innerHTML =
      '<div>' +
        '<span class="tag">Manşet</span>' +
        '<h1>'+esc(L.title)+'</h1>' +
        '<p>'+esc(L.excerpt)+'</p>' +
        '<div class="src">' +
          (L.source&&L.source.tier===1 ? '<span class="t1">&#9679; birincil</span>'
                                       : '<span>&#9675; destekleyici</span>') +
          '<span>'+esc((L.source&&L.source.name)||host(L.source&&L.source.url))+'</span><span>·</span>' +
          '<span>'+tarih(L.published_date)+'</span>' +
        '</div>' +
      '</div>' +
      (gi ? '<div class="lead-img"><img src="'+esc(gi)+'" alt="" loading="lazy" ' +
            'onerror="this.parentElement.remove();document.getElementById(\'lead\').classList.add(\'noimg\')"></div>' : "");
    el.onclick = function(){ ac(L.slug); };
  }

  // Öne çıkanlar
  document.getElementById("grid").innerHTML = (DATA.stories||[]).map(function(s){
    const gi = img(s);
    return '<button class="card '+(gi?"":"noimg")+'" data-slug="'+esc(s.slug)+'">' +
      (gi ? '<div class="card-img"><img src="'+esc(gi)+'" alt="" loading="lazy" ' +
            'onerror="this.closest(\'.card\').classList.add(\'noimg\');this.parentElement.remove()"></div>' : "") +
      '<div class="meta">' +
        '<span class="cat" data-c="'+esc(s.category)+'">'+esc(CAT[s.category]||s.category)+'</span>' +
        (s.maturity&&MAT[s.maturity] ? '<span class="mat">'+esc(MAT[s.maturity])+'</span>' : "") +
      '</div>' +
      '<h2>'+esc(s.title)+'</h2>' +
      '<p>'+esc(s.excerpt)+'</p>' +
      '<div class="src">' +
        (s.source&&s.source.tier===1 ? '<span class="t1">&#9679; birincil</span>'
                                     : '<span>&#9675; destekleyici</span>') +
        '<span>'+esc((s.source&&s.source.name)||host(s.source&&s.source.url))+'</span><span>·</span>' +
        '<span>'+tarih(s.published_date)+'</span>' +
      '</div>' +
    '</button>';
  }).join("");
  document.querySelectorAll(".card").forEach(function(c){ c.onclick=function(){ ac(c.dataset.slug); }; });

  // Radar
  const kl = DATA.radar||[];
  document.getElementById("radar").innerHTML = kl.length ? kl.map(function(k){
    return '<div class="cluster"><h3>'+esc(k.kume)+'</h3>' +
      (k.maddeler||[]).map(function(m){
        return '<a href="'+esc(m.url)+'" target="_blank" rel="noopener">' +
          '<time>'+tarih(m.date)+'</time><span>'+esc(m.title)+'</span>' +
          '<em>'+esc(m.source||host(m.url))+' &#8599;</em></a>';
      }).join("") + '</div>';
  }).join("") : '<div class="empty">Bu hafta radar boş.</div>';

  if(location.hash.indexOf("#/haber/")===0) ac(location.hash.slice(8));
}

function ac(slug){
  const s = TUM.find(function(x){ return x.slug===slug; });
  if(!s) return;
  const gi = img(s);
  const facts = [
    ["Kategori", CAT[s.category]],
    s.maturity && MAT[s.maturity] ? ["Aşama", MAT[s.maturity]] : null,
    (s.companies||[]).length ? ["Şirket", s.companies.join(", ")] : null,
    (s.countries||[]).length ? ["Ülke", s.countries.join(", ")] : null,
    (s.technology_nodes||[]).length ? ["Düğüm", s.technology_nodes.join(", ")] : null,
    (s.technologies||[]).length ? ["Teknoloji", s.technologies.join(", ")] : null,
    ["Tarih", tarih(s.event_date||s.published_date)]
  ].filter(Boolean);

  document.getElementById("doc").innerHTML =
    '<button class="close" data-close aria-label="Kapat">&#10005;</button>' +
    '<span class="tag">'+esc(CAT[s.category]||"")+'</span>' +
    (gi ? '<div class="doc-img"><img src="'+esc(gi)+'" alt="" onerror="this.parentElement.remove()"></div>' : "") +
    '<h2>'+esc(s.title)+'</h2>' +
    '<div class="facts">' + facts.map(function(f){
        return '<span class="fact">'+esc(f[0])+' <b>'+esc(f[1])+'</b></span>'; }).join("") + '</div>' +
    '<div class="body">' + String(s.detail||s.excerpt).split(/\n\n+/).map(function(p){
        return '<p>'+esc(p)+'</p>'; }).join("") + '</div>' +
    '<div class="why '+(s.neden_onemli?"on":"")+'">' +
      '<span>Editoryal değerlendirme</span>'+esc(s.neden_onemli||"") + '</div>' +
    '<div class="sources"><h4>Kaynaklar</h4>' +
      '<a href="'+esc(s.source&&s.source.url)+'" target="_blank" rel="noopener">' +
        '<span class="p">&#9679; BİRİNCİL</span> ' +
        esc((s.source&&s.source.name)||host(s.source&&s.source.url))+' &#8599;</a>' +
      (s.supporting_sources||[]).map(function(k){
        return '<a href="'+esc(k.url)+'" target="_blank" rel="noopener">' +
          esc(k.name||host(k.url))+' &#8599;</a>'; }).join("") +
    '</div>';

  document.getElementById("sheet").classList.add("on");
  document.body.style.overflow="hidden";
  history.replaceState(null,"","#/haber/"+slug);
  document.getElementById("doc").scrollTop = 0;
}

function kapat(){
  document.getElementById("sheet").classList.remove("on");
  document.body.style.overflow="";
  history.replaceState(null,"",location.pathname+location.search);
}
document.addEventListener("click",function(e){ if(e.target.closest("[data-close]")) kapat(); });
document.addEventListener("keydown",function(e){ if(e.key==="Escape") kapat(); });
</script>
</body>
</html>
